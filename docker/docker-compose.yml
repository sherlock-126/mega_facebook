# Development Docker Compose Configuration
# For production deployment, use docker-compose.prod.yml
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mega_postgres
    environment:
      # Development credentials - DO NOT use in production
      POSTGRES_USER: mega
      POSTGRES_PASSWORD: mega_secret
      POSTGRES_DB: mega_facebook
    ports:
      - '5432:5432'  # Exposed for development - secured in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mega -d mega_facebook']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mega_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mega_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: mega_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional: Migrations runner service (for docker-compose up)
  # Uncomment if you want automatic migrations when using docker-compose
  # migrations:
  #   image: node:20-alpine
  #   container_name: mega_migrations
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://mega:mega_secret@postgres:5432/mega_facebook
  #     SEED_ON_START: 'true'  # Set to true for auto-seeding
  #   volumes:
  #     - ./apps/api:/app
  #     - ./docker/scripts/run-migrations.sh:/app/run-migrations.sh
  #   working_dir: /app
  #   command: sh /app/run-migrations.sh

volumes:
  postgres_data:
  redis_data:
  minio_data:
  elasticsearch_data:
