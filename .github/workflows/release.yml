name: Release to R2

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
            if [ "$VERSION" == "undefined" ]; then
              VERSION="1.0.0"
            fi
            VERSION="${VERSION}-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create API artifact
        run: |
          cd apps/api
          tar -czf ../../api.tar.gz \
            dist \
            node_modules \
            prisma \
            package.json \
            --exclude=node_modules/.cache \
            --exclude=node_modules/.vite

      - name: Create Web artifact
        run: |
          cd apps/web
          tar -czf ../../web.tar.gz \
            .next \
            public \
            package.json \
            next.config.js \
            --exclude=.next/cache

      - name: Generate checksums
        run: |
          sha256sum api.tar.gz | cut -d' ' -f1 > api.checksum
          sha256sum web.tar.gz | cut -d' ' -f1 > web.checksum

      - name: Create manifest.json
        run: |
          node .github/scripts/generate-manifest.js \
            --version "${{ steps.version.outputs.VERSION }}" \
            --buildId "${{ github.sha }}" \
            --apiSize "$(stat -c%s api.tar.gz)" \
            --webSize "$(stat -c%s web.tar.gz)" \
            --apiChecksum "$(cat api.checksum)" \
            --webChecksum "$(cat web.checksum)"

      - name: Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: maytrix
        run: |
          node .github/scripts/upload-r2.js \
            --version "${{ steps.version.outputs.VERSION }}" \
            --artifacts api.tar.gz,web.tar.gz,manifest.json

      - name: Update versions.json
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: maytrix
        run: |
          node .github/scripts/update-versions.js \
            --version "${{ steps.version.outputs.VERSION }}" \
            --stable "${{ startsWith(github.ref, 'refs/tags/v') }}"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            api.tar.gz
            web.tar.gz
            manifest.json
          body: |
            ## AutoNow FB Release ${{ steps.version.outputs.VERSION }}

            ### Installation
            ```bash
            npx autonow-fb install --version ${{ steps.version.outputs.VERSION }}
            ```

            ### Update from previous version
            ```bash
            autonow-fb update
            ```

            ### What's Changed
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.sha }})

      - name: Notify success
        if: success()
        run: echo "✅ Successfully released version ${{ steps.version.outputs.VERSION }} to R2"