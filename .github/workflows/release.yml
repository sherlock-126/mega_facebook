name: Release to Cloudflare R2

on:
  push:
    branches:
      - task/c499184b
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: false
        type: string

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.R2_ACCOUNT_ID }}" ]]; then
            echo "::error::R2_ACCOUNT_ID secret is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ]]; then
            echo "::error::R2_ACCESS_KEY_ID secret is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]]; then
            echo "::error::R2_SECRET_ACCESS_KEY secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # For main branch, use package version with commit hash
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
            VERSION="v${VERSION}-$(git rev-parse --short HEAD)"
          fi

          # Ensure version starts with v
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v${VERSION}"
          fi

          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "version_tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

  build-and-release:
    name: Build and Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Create API artifact
        run: |
          cd apps/api
          tar -czf ../../api.tar.gz \
            dist \
            prisma \
            package.json \
            tsconfig*.json \
            .env.example

      - name: Create Web artifact
        run: |
          cd apps/web
          tar -czf ../../web.tar.gz \
            .next \
            public \
            package.json \
            next.config.js \
            tsconfig*.json

      - name: Generate checksums
        run: |
          sha256sum api.tar.gz | cut -d' ' -f1 > api.checksum
          sha256sum web.tar.gz | cut -d' ' -f1 > web.checksum

      - name: Create manifest.json
        run: |
          cat > manifest.json << EOF
          {
            "version": "${{ needs.validate.outputs.version }}",
            "tag": "${{ needs.validate.outputs.version_tag }}",
            "buildId": "${{ github.sha }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "artifacts": {
              "api": {
                "url": "https://maytrix.r2.cloudflarestorage.com/releases/${{ needs.validate.outputs.version_tag }}/api.tar.gz",
                "size": $(stat -c%s api.tar.gz 2>/dev/null || stat -f%z api.tar.gz),
                "checksum": "$(cat api.checksum)"
              },
              "web": {
                "url": "https://maytrix.r2.cloudflarestorage.com/releases/${{ needs.validate.outputs.version_tag }}/web.tar.gz",
                "size": $(stat -c%s web.tar.gz 2>/dev/null || stat -f%z web.tar.gz),
                "checksum": "$(cat web.checksum)"
              }
            },
            "requirements": {
              "node": ">=20.0.0",
              "docker": ">=24.0.0"
            }
          }
          EOF

      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # Create upload script inline to avoid dependency on external scripts
          cat > upload-r2.js << 'EOF'
          const { S3Client, PutObjectCommand } = require('@aws-sdk/client-s3');
          const fs = require('fs');
          const path = require('path');

          const R2_BUCKET = 'maytrix';
          const VERSION = '${{ needs.validate.outputs.version_tag }}';

          const client = new S3Client({
            region: 'auto',
            endpoint: `https://${process.env.R2_ACCOUNT_ID}.r2.cloudflarestorage.com`,
            credentials: {
              accessKeyId: process.env.R2_ACCESS_KEY_ID,
              secretAccessKey: process.env.R2_SECRET_ACCESS_KEY
            }
          });

          async function uploadFile(filePath, key) {
            const fileStream = fs.createReadStream(filePath);
            const fileStats = fs.statSync(filePath);

            let contentType = 'application/octet-stream';
            if (filePath.endsWith('.tar.gz')) contentType = 'application/gzip';
            else if (filePath.endsWith('.json')) contentType = 'application/json';

            await client.send(new PutObjectCommand({
              Bucket: R2_BUCKET,
              Key: key,
              Body: fileStream,
              ContentType: contentType,
              ContentLength: fileStats.size
            }));

            console.log(`✅ Uploaded: ${key}`);
          }

          async function main() {
            try {
              // Upload artifacts
              await uploadFile('api.tar.gz', `releases/${VERSION}/api.tar.gz`);
              await uploadFile('web.tar.gz', `releases/${VERSION}/web.tar.gz`);
              await uploadFile('manifest.json', `releases/${VERSION}/manifest.json`);

              // Update latest
              await uploadFile('api.tar.gz', 'releases/latest/api.tar.gz');
              await uploadFile('web.tar.gz', 'releases/latest/web.tar.gz');
              await uploadFile('manifest.json', 'releases/latest/manifest.json');

              console.log(`\n🚀 Release ${VERSION} successfully uploaded to R2!`);
            } catch (error) {
              console.error('Upload failed:', error);
              process.exit(1);
            }
          }

          main();
          EOF

          # Install AWS SDK and run upload
          npm install @aws-sdk/client-s3
          node upload-r2.js

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            api.tar.gz
            web.tar.gz
            manifest.json
          body: |
            ## AutoNow FB Release ${{ needs.validate.outputs.version }}

            ### Installation
            ```bash
            npx autonow-fb install --version ${{ needs.validate.outputs.version }}
            ```

            ### Update from previous version
            ```bash
            autonow-fb update
            ```

            ### What's Changed
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.sha }})

      - name: Notify success
        if: success()
        run: echo "✅ Successfully released version ${{ needs.validate.outputs.version_tag }} to R2"